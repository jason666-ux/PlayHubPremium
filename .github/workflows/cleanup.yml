name: Clean Old Logs
on:
  schedule:
    - cron: '30 18 * * *' 
  workflow_dispatch:

jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0   
          keep_minimum_runs: 1 

